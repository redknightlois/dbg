<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>dbg demo</title>
<link rel="stylesheet" type="text/css" href="https://unpkg.com/asciinema-player@3.8.0/dist/bundle/asciinema-player.css">
<style>
  body {
    margin: 0;
    background: #1e1e2e;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
  }
  h1 {
    color: #cdd6f4;
    font-size: 1.4rem;
    margin-bottom: 1rem;
  }
  #player {
    max-width: 720px;
    width: 100%;
  }
</style>
</head>
<body>
  <h1>dbg: agent debugging in 30 seconds</h1>
  <div id="player"></div>
  <script src="https://unpkg.com/asciinema-player@3.8.0/dist/bundle/asciinema-player.min.js"></script>
  <script>
    AsciinemaPlayer.create('https://raw.githubusercontent.com/redknightlois/dbg/main/public/demo.cast', document.getElementById('player'), {
      theme: 'monokai',
      fit: 'width',
      idleTimeLimit: 1,
      speed: 1
    });
  </script>
</body>
</html>
